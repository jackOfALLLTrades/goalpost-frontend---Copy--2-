<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GoalPost Login</title>

<style>
:root {
  --bg:#0f0a1f;
  --card:#1a1333;
  --text:#f3f0ff;
  --muted:#b9b3d9;
  --accent:#a855f7;
  --accent-glow:#c084fc;
  --border:#2a1f4a;
}

body {
  margin:0;
  font-family:system-ui;
  background: radial-gradient(circle at top, #1a1333, #0f0a1f);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  color:var(--text);
  padding:20px;
}

.card {
  background:var(--card);
  padding:28px;
  border-radius:16px;
  width:320px;
  border:1px solid var(--border);
  box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

h2 {
  color:#c084fc;
  margin-top:0;
}

p {
  color: var(--muted);
}

input {
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid var(--border);
  background:#120d25;
  color:white;
}

input:focus {
  outline:none;
  border-color:var(--accent);
}

button {
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:var(--accent);
  color:white;
  cursor:pointer;
  box-shadow:0 0 10px var(--accent-glow);
  transition:0.2s;
}

button:hover {
  transform:scale(1.03);
  box-shadow:0 0 18px var(--accent-glow);
}

.error {
  color:#ff6b6b;
  margin-top:10px;
  font-size:14px;
}

.hidden {
  display:none;
}

.bar-wrap {
  display:flex;
  gap:4px;
  margin-top:8px;
}

.bar {
  height:6px;
  flex:1;
  background:#2a1f4a;
  border-radius:4px;
}

.bar.active.red {
  background:#ff4d4d;
}

.bar.active.orange {
  background:#ff914d;
}

.bar.active.green {
  background:#22c55e;
}

#passwordRules {
  margin-top:10px;
  padding-left:18px;
  font-size:13px;
}

#passwordRules li {
  color:#ff6b6b;
  margin-top:4px;
}

#passwordRules li.valid {
  color:#22c55e;
}

.note {
  font-size:12px;
  color:var(--muted);
  margin-top:8px;
}
</style>
</head>

<body>

<div class="card">
  <h2>GoalPost</h2>
  <p id="subtitle">Stay on top of your goals and schedule</p>

  <!-- Login Form -->
  <div id="loginSection">
    <input id="loginEmail" placeholder="Email">
    <input id="loginPassword" type="password" placeholder="Password">

    <button onclick="login()">Login</button>
    <button onclick="showRegister()">Create Account</button>
  </div>

  <!-- Register Form -->
  <div id="registerSection" class="hidden">
    <input id="firstName" placeholder="First Name">
    <input id="lastName" placeholder="Last Name">

    <input id="registerEmail" placeholder="Email">
    <input id="confirmEmail" placeholder="Confirm Email">

    <input id="registerPassword" type="password" placeholder="Password">

    <div class="bar-wrap">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>

    <ul id="passwordRules">
      <li id="lengthRule">At least 8 characters</li>
      <li id="numberRule">Contains a number</li>
      <li id="symbolRule">Contains a symbol (!@#$%^&*)</li>
      <li id="caseRule">Contains uppercase and lowercase letter</li>
    </ul>

    <input id="confirmPassword" type="password" placeholder="Confirm Password">

    <button onclick="register()">Register Account</button>
    <button onclick="showLogin()">Back to Login</button>
  </div>

  <div id="error" class="error"></div>
</div>

<script>
let users = JSON.parse(localStorage.getItem("users")) || [];

const passwordInput = document.getElementById("registerPassword");
passwordInput.addEventListener("input", updatePasswordStrength);

function showRegister() {
  document.getElementById("loginSection").classList.add("hidden");
  document.getElementById("registerSection").classList.remove("hidden");
  document.getElementById("subtitle").textContent = "Create your account";
  clearMessage();
}

function showLogin() {
  document.getElementById("registerSection").classList.add("hidden");
  document.getElementById("loginSection").classList.remove("hidden");
  document.getElementById("subtitle").textContent = "Stay on top of your goals and schedule";
  clearMessage();
}

function clearMessage() {
  const error = document.getElementById("error");
  error.textContent = "";
  error.style.color = "#ff6b6b";
}

function updatePasswordStrength() {
  const password = passwordInput.value;

  const lengthValid = password.length >= 8;
  const numberValid = /\d/.test(password);
  const symbolValid = /[!@#$%^&*]/.test(password);
  const caseValid = /[a-z]/.test(password) && /[A-Z]/.test(password);

  updateRule("lengthRule", lengthValid);
  updateRule("numberRule", numberValid);
  updateRule("symbolRule", symbolValid);
  updateRule("caseRule", caseValid);

  const score = [lengthValid, numberValid, symbolValid, caseValid].filter(Boolean).length;
  updateBars(score);
}

function updateRule(id, isValid) {
  const el = document.getElementById(id);

  if (isValid) {
    el.classList.add("valid");
  } else {
    el.classList.remove("valid");
  }
}

function updateBars(score) {
  const bars = document.querySelectorAll(".bar");

  bars.forEach(function(bar) {
    bar.className = "bar";
  });

  for (let i = 0; i < score; i++) {
    if (score <= 2) {
      bars[i].classList.add("active", "red");
    } else if (score === 3) {
      bars[i].classList.add("active", "orange");
    } else {
      bars[i].classList.add("active", "green");
    }
  }
}

function login() {
  const email = document.getElementById("loginEmail").value.trim().toLowerCase();
  const password = document.getElementById("loginPassword").value;
  const error = document.getElementById("error");

  clearMessage();

  if (!email || !password) {
    error.textContent = "Please enter email and password.";
    return;
  }

  const user = users.find(function(u) {
    return u.email === email;
  });

  if (!user) {
    error.textContent = "Email not found. Please register first.";
    return;
  }

  if (user.password !== password) {
    error.textContent = "Incorrect password.";
    return;
  }

  localStorage.setItem("user", JSON.stringify({
    fullName: user.fullName,
    email: user.email
  }));

  window.location.href = "dashboardpage.html";
}

function register() {
  const firstName = document.getElementById("firstName").value.trim();
  const lastName = document.getElementById("lastName").value.trim();
  const email = document.getElementById("registerEmail").value.trim().toLowerCase();
  const confirmEmail = document.getElementById("confirmEmail").value.trim().toLowerCase();
  const password = document.getElementById("registerPassword").value;
  const confirmPassword = document.getElementById("confirmPassword").value;
  const error = document.getElementById("error");

  clearMessage();

  if (!firstName || !lastName) {
    error.textContent = "Enter first and last name.";
    return;
  }

  if (!email || !confirmEmail) {
    error.textContent = "Please enter your email twice.";
    return;
  }

  if (email !== confirmEmail) {
    error.textContent = "Emails do not match.";
    return;
  }

  if (!password || !confirmPassword) {
    error.textContent = "Please enter your password twice.";
    return;
  }

  const lengthValid = password.length >= 8;
  const numberValid = /\d/.test(password);
  const symbolValid = /[!@#$%^&*]/.test(password);
  const caseValid = /[a-z]/.test(password) && /[A-Z]/.test(password);

  if (!(lengthValid && numberValid && symbolValid && caseValid)) {
    error.textContent = "Password does not meet requirements.";
    return;
  }

  if (password !== confirmPassword) {
    error.textContent = "Passwords do not match.";
    return;
  }

  if (users.find(function(u) {
    return u.email === email;
  })) {
    error.textContent = "User already exists.";
    return;
  }

  const fullName = firstName + " " + lastName;

  users.push({
    fullName: fullName,
    email: email,
    password: password
  });

  localStorage.setItem("users", JSON.stringify(users));

  error.style.color = "lightgreen";
  error.textContent = "Account created! You can now log in.";

  document.getElementById("firstName").value = "";
  document.getElementById("lastName").value = "";
  document.getElementById("registerEmail").value = "";
  document.getElementById("confirmEmail").value = "";
  document.getElementById("registerPassword").value = "";
  document.getElementById("confirmPassword").value = "";
  updatePasswordStrength();

  setTimeout(function() {
    showLogin();
  }, 1000);
}
</script>

</body>
</html>
